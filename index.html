<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <script data-goatcounter="https://eliasrd.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    video {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* Botón descargar */
    .download-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      z-index: 20;
    }

    .download-btn:hover {
      background: rgba(0,0,0,0.9);
    }

    .click-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* ESTILOS DE LA VENTANA EMERGENTE (MODAL) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85); /* Fondo oscuro semitransparente */
      display: none; /* Oculto por defecto */
      justify-content: center;
      align-items: center;
      z-index: 100; /* Por encima de todo */
    }

    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      color: white;
      max-width: 80%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .modal-box p {
      margin: 0 0 20px 0;
      font-size: 18px;
    }

    .continue-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 25px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .continue-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

<div class="video-container">

  <a href="video.mp4" download class="download-btn">
    Descargar
  </a>

  <video id="mainVideo" autoplay muted loop playsinline controls>
    <source src="video.mp4" type="video/mp4">
  </video>

  <a href="https://soundfrankcoke.com/sniepp8pt?key=ce3b26de79e141751b54f0ad2b1df813"
     target="_blank"
     class="click-layer">
  </a>

</div>

<div id="popupModal" class="modal-overlay">
  <div class="modal-box">
    <p>¿Quieres continuar viendo el video?</p>
    <button id="btnContinue" class="continue-btn">Continuar</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('mainVideo');
    const modal = document.getElementById('popupModal');
    const btnContinue = document.getElementById('btnContinue');
    const targetUrl = "https://soundfrankcoke.com/sniepp8pt?key=ce3b26de79e141751b54f0ad2b1df813";

    // Generar tiempo aleatorio entre 10000ms (10s) y 20000ms (20s)
    const randomTime = Math.floor(Math.random() * (20000 - 10000 + 1) + 10000);
    console.log("El popup aparecerá en: " + (randomTime / 1000) + " segundos");

    // Temporizador para mostrar el modal
    setTimeout(() => {
      if (!video.paused) {
        video.pause(); // Pausar video
      }
      modal.style.display = 'flex'; // Mostrar modal
    }, randomTime);

    // Acción del botón Continuar
    btnContinue.addEventListener('click', function() {
      // 1. Abrir enlace en nueva pestaña
      window.open(targetUrl, '_blank');
      
      // 2. Ocultar modal
      modal.style.display = 'none';
      
      // 3. Reanudar video
      video.play();
    });
  });
</script>

</body>
</html>
