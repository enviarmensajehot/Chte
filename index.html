<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.video-container {
  position: relative;
  width: 100%;
  max-width: 500px;
}

video {
  width: 100%;
  display: block;
}

.popup {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 30;
}

.popup button {
  margin-top: 12px;
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="video-container">
  <video id="player" controls>
    <source src="video.mp4" type="video/mp4">
  </video>

  <div id="popup" class="popup">
    <div>¿Quieres continuar viendo?</div>
    <button onclick="resumeVideo()">Continuar</button>
    <button onclick="window.open('https://tusitio.com', '_blank')">
      Ir a oferta
    </button>
  </div>
</div>

<script>
const video = document.getElementById("player");
const popup = document.getElementById("popup");

let triggered = false;
const randomTime = Math.floor(Math.random() * 11) + 10; // 10–20s

video.addEventListener("timeupdate", () => {
  if (!triggered && video.currentTime >= randomTime) {
    triggered = true;
    video.pause();
    popup.style.display = "flex";
  }
});

function resumeVideo() {
  popup.style.display = "none";
  video.play();
}
</script>

</body>
</html>
