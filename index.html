<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<!-- GoatCounter -->
<script data-goatcounter="https://eliasrd.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.video-container {
  position: relative;
  width: 100%;
  max-width: 500px;
}

video {
  width: 100%;
  display: block;
}

.click-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
}

.popup {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 30;
}

.popup button {
  margin-top: 12px;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="video-container">
  <video id="player" autoplay muted loop playsinline controls>
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- Smartlink en todo el video -->
  <a href="https://soundfrankcoke.com/sniepp8pt?key=ce3b26de79e141751b54f0ad2b1df813"
     target="_blank"
     class="click-layer">
  </a>

  <!-- Popup continuar -->
  <div id="popup" class="popup">
    <div>Haga click para continuar viendo</div>
    <button onclick="resumeVideo()">Continuar</button>
  </div>
</div>

<script>
const video = document.getElementById("player");
const popup = document.getElementById("popup");

let triggered = false;
const randomTime = Math.floor(Math.random() * 11) + 10; // 10–20s

video.addEventListener("timeupdate", () => {
  if (!triggered && video.currentTime >= randomTime) {
    triggered = true;
    video.pause();
    popup.style.display = "flex";
  }
});

function resumeVideo() {
  popup.style.display = "none";
  video.play();
}
</script>

</body>
</html>
