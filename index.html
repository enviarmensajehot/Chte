<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <!-- GoatCounter -->
  <script data-goatcounter="https://eliasrd.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .click-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <a href="https://soundfrankcoke.com/sniepp8pt?key=ce3b26de79e141751b54f0ad2b1df813
     target="_blank"
     class="click-layer">
  </a>
</div>

</body>
</html>
